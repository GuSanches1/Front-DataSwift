<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Motorista</title>

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/dashboard_motorista.css" />
  </head>

  <body>
    <div id="header"></div>

    <main class="container">
      <!-- TOPO -->
      <div class="painel-motorista">
        <!-- TEXTO -->
        <div class="intro">
          <h1>Controle suas despesas</h1>
          <p>
            Registre seus gastos, acompanhe o status dos reembolsos e envie seus
            comprovantes de forma rápida e organizada.
          </p>
        </div>

        <!-- CARDS PRINCIPAIS -->
        <div class="cards-motorista">
          <div class="card-motorista">
            <h2>Minhas Despesas</h2>
            <span>R$ 2.500</span>
            <p>Total registrado no período atual</p>

            <button>Ver despesas</button>
          </div>

          <div class="card-motorista">
            <h2>Pendentes</h2>
            <span>3</span>
            <p>Aguardando aprovação</p>

            <button>Acompanhar</button>
          </div>

          <div class="card-motorista">
            <h2>A Receber</h2>
            <span>R$ 1.200</span>
            <p>Valores aprovados para pagamento</p>

            <button>Detalhes</button>
          </div>
        </div>
      </div>
    </main>
    <div id="footer"></div>
    <script src="../js/script.js"></script>
  </body>
</html>
